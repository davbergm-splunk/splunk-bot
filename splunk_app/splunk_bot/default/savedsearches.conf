[SPLUNK-BOT Run Audit]
search = | runaudit
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 0
disabled = 0
description = Run the SPLUNK-BOT platform audit now. Executes audit_runner.py and writes findings to splunk_bot index.

[SPLUNK-BOT Scheduled Audit]
search = | runaudit
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 1
cron_schedule = 0 6 * * *
disabled = 1
description = Scheduled daily audit at 06:00. Enable to auto-run.

[SPLUNK-BOT Dashboard Cache]
search = index=splunk_bot sourcetype="splunkbot:audit:finding" earliest=-90d latest=now | sort -_time | eval _key=event_type.":".severity.":".check.":".domain | table _time _key audit_time audit_id host splunk_version event_type domain domain_label check check_label result severity detail score overall_score overall_status critical_count warning_count info_count ok_count domains_audited domain_score domain_weight weighted_score
dispatch.earliest_time = -90d
dispatch.latest_time = now
enableSched = 1
cron_schedule = 7,37 * * * *
dispatch.ttl = 2400
auto_summarize = 1
auto_summarize.dispatch.earliest_time = -90d
disabled = 0
description = Pre-computes audit data twice per hour for fast dashboard loading.
