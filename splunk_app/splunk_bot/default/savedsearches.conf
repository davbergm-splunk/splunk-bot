[SPLUNK-BOT Run Audit]
search = | runaudit
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 0
disabled = 0
description = Run the SPLUNK-BOT platform audit now. Executes audit_runner.py and writes findings to splunk_bot index.

[SPLUNK-BOT Scheduled Audit]
search = | runaudit
dispatch.earliest_time = -1m
dispatch.latest_time = now
enableSched = 1
cron_schedule = 0 6 * * *
disabled = 1
description = Scheduled daily audit at 06:00. Enable to auto-run.
