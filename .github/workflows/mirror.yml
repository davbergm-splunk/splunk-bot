name: Mirror to DaveBergman + GitLab

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        run: |
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/DaveBergman/${{ github.event.repository.name }}.git
          git push mirror main --force

      - name: Push to GitLab backup
        if: always()
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/DavBergm-Splunk/splunk-bot.git
          git push gitlab main --force
        continue-on-error: true
