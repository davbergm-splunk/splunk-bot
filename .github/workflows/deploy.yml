name: Deploy to AM06

on:
  workflow_dispatch:
    inputs:
      restart_splunk:
        description: 'Restart Splunk after deploy'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy splunk_bot to AM06
    runs-on: [self-hosted, am06]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy app via rsync
        env:
          SPLUNK_HOME: ${{ secrets.SPLUNK_HOME }}
        run: |
          rsync -avz --delete \
            --exclude='.*' \
            splunk_app/splunk_bot/ \
            "$SPLUNK_HOME/etc/apps/splunk_bot/"

      - name: Restart Splunk
        if: inputs.restart_splunk
        env:
          SPLUNK_BIN: ${{ secrets.SPLUNK_BIN }}
        run: $SPLUNK_BIN restart || true

      - name: Deploy summary
        if: always()
        run: |
          echo "## splunk-bot Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed splunk_bot app to AM06" >> "$GITHUB_STEP_SUMMARY"
